<div xmlns:th="http://www.thymeleaf.org" th:fragment="chatbot" class="chatbot-widget">
  <button class="chatbot-toggle" type="button" onclick="toggleChatbot()">Help</button>
  <div class="chatbot-panel" id="chatbotPanel">
    <div class="chatbot-header">JobPortal Assistant</div>
    <div class="chatbot-body" id="chatbotBody">
      <p class="bot-msg">Ask about applying, resumes, job status, or employer posting.</p>
    </div>
    <form class="chatbot-form" onsubmit="askChatbot(event)">
      <input id="chatbotQuestion" class="form-control" placeholder="Type your question"/>
      <button class="btn btn-primary btn-sm" type="submit">Send</button>
    </form>
  </div>
  <script>
    function toggleChatbot() {
      document.getElementById('chatbotPanel').classList.toggle('open');
    }
    function askChatbot(event) {
      event.preventDefault();
      const input = document.getElementById('chatbotQuestion');
      const body = document.getElementById('chatbotBody');
      const question = input.value.trim();
      if (!question) return;
      body.insertAdjacentHTML('beforeend', '<p class="user-msg"></p>');
      body.lastElementChild.textContent = question;
      fetch('/api/chatbot', {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: new URLSearchParams({question})
      }).then(r => r.json()).then(data => {
        body.insertAdjacentHTML('beforeend', '<p class="bot-msg"></p>');
        body.lastElementChild.textContent = data.reply;
        body.scrollTop = body.scrollHeight;
      });
      input.value = '';
    }
  </script>
</div>
