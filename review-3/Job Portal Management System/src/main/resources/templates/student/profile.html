<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile - JobPortal</title>
  <meta name="description" content="Manage your job seeker profile and resume."/>
  <link rel="stylesheet" th:href="@{/css/styles.css}"/>
</head>
<body>
<nav class="navbar">
  <a th:href="@{/}" class="navbar-brand">Job<span>Portal</span></a>
  <div class="nav-links">
    <a th:href="@{/jobs}" class="nav-link">Browse Jobs</a>
    <a th:href="@{/dashboard}" class="nav-link">Dashboard</a>
    <a th:href="@{/student/profile}" class="nav-link active">Profile</a>
    <form th:action="@{/logout}" method="post" style="display:inline">
      <button type="submit" class="btn btn-outline" style="cursor:pointer;font-family:inherit">Logout</button>
    </form>
  </div>
</nav>

<div style="max-width:760px;margin:3rem auto;padding:0 1.5rem;">
  <a th:href="@{/dashboard}" class="btn btn-outline btn-sm mb-2">Back to Dashboard</a>
  <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
  <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

  <div class="card" style="padding:2.5rem;">
    <h1 style="font-size:1.7rem;font-weight:800;margin-bottom:0.3rem;">Job Seeker Profile</h1>
    <p class="text-muted" style="margin-bottom:2rem;">Keep your profile current so employers can evaluate your application quickly.</p>

    <form th:action="@{/student/profile}" method="post" enctype="multipart/form-data">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input id="name" name="name" class="form-control" th:value="${user.name}" required/>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
        <div class="form-group">
          <label for="phone">Phone</label>
          <input id="phone" name="phone" class="form-control" th:value="${user.phone}" placeholder="+91 98765 43210"/>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input class="form-control" th:value="${user.email}" readonly/>
        </div>
      </div>
      <div class="form-group">
        <label for="address">Address</label>
        <input id="address" name="address" class="form-control" th:value="${user.address}" placeholder="City, State"/>
      </div>
      <div class="form-group">
        <label for="skills">Skills</label>
        <input id="skills" name="skills" class="form-control" th:value="${user.skills}" placeholder="Java, Spring Boot, SQL"/>
      </div>
      <div class="form-group">
        <label for="education">Education</label>
        <input id="education" name="education" class="form-control" th:value="${user.education}" placeholder="B.Tech Computer Science"/>
      </div>
      <div class="form-group">
        <label for="resume">Resume (PDF, DOC, DOCX)</label>
        <input id="resume" name="resume" type="file" class="form-control" accept=".pdf,.doc,.docx"/>
        <p th:if="${user.resumePath != null}" class="text-muted mt-1">
          Current resume:
          <a th:href="@{${user.resumePath}}" target="_blank" style="color:var(--primary-light);" th:text="${user.resumeFileName != null ? user.resumeFileName : 'View resume'}">View resume</a>
        </p>
      </div>
      <div class="form-group">
        <label for="certificates">Certificates / Portfolio Files</label>
        <input id="certificates" name="certificates" type="file" class="form-control" accept=".pdf,.doc,.docx" multiple/>
      </div>
      <div th:if="${user.parsedResume != null}" class="alert alert-info" th:text="${'Parsed resume summary: ' + user.parsedResume}"></div>
      <button type="submit" class="btn btn-primary">Save Profile</button>
    </form>
  </div>

  <div class="card" style="padding:2rem;margin-top:1.5rem;">
    <h2 style="font-size:1.2rem;font-weight:700;margin-bottom:1rem;">Uploaded Files</h2>
    <p th:if="${#lists.isEmpty(files)}" class="text-muted">No additional files uploaded.</p>
    <div th:each="file : ${files}" style="display:flex;justify-content:space-between;gap:1rem;border-top:1px solid var(--border);padding:0.8rem 0;">
      <span th:text="${file.fileName}">File</span>
      <a th:href="@{${file.fileUrl}}" target="_blank" class="btn btn-outline btn-sm">View</a>
    </div>
  </div>
</div>

<footer><p>Copyright 2026 <strong>JobPortal</strong>. <a th:href="@{/}">Home</a></p></footer>
<style>@media(max-width:600px){div[style*="grid-template-columns:1fr 1fr"]{grid-template-columns:1fr!important}}</style>
</body>
</html>
