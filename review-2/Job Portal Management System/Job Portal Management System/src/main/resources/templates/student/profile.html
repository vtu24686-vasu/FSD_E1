<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Student Profile</title><link rel="stylesheet" th:href="@{/css/styles.css}"></head>
<body>
<div class="app-shell">
    <aside class="sidebar">
        <div class="brand">JobPilot</div>
        <a class="nav-link" th:href="@{/student/dashboard}">Dashboard</a>
        <a class="nav-link" th:href="@{/student/jobs}">Search Jobs</a>
        <a class="nav-link" th:href="@{/student/applied}">Applied Jobs</a>
        <a class="nav-link" th:href="@{/student/notifications}">Notifications</a>
        <a class="nav-link" th:href="@{/student/details}">Student Details</a>
        <a class="nav-link active" th:href="@{/student/profile}">Profile</a>
        <a class="nav-link" th:href="@{/logout}">Logout</a>
    </aside>
    <main class="main">
        <div class="topbar"><h3>Profile & Resume</h3><span class="muted">Keep your profile updated</span></div>
        <section class="page grid grid-2">
            <div class="card">
                <h3>Primary Profile</h3>
                <form th:action="@{/student/profile}" method="post">
                    <label>Name</label><input class="input" name="name" th:value="${student.name}" required>
                    <label>Skills (comma separated)</label><input class="input" name="skills" th:value="${student.skills}" required>
                    <label>Experience (years)</label><input class="input" type="number" name="experience" th:value="${student.experience}">
                    <label>Roll Number</label><input class="input" name="rollNumber" th:value="${student.rollNumber}">
                    <label>Gender</label><input class="input" name="gender" th:value="${student.gender}">
                    <label>Father Name</label><input class="input" name="fatherName" th:value="${student.fatherName}">
                    <label>Mother Name</label><input class="input" name="motherName" th:value="${student.motherName}">
                    <label>Date Of Birth</label><input class="input" type="date" name="dateOfBirth" th:value="${student.dateOfBirth}">
                    <label>Degree</label><input class="input" name="degree" th:value="${student.degree}">
                    <label>Branch</label><input class="input" name="branch" th:value="${student.branch}">
                    <label>College Name</label><input class="input" name="collegeName" th:value="${student.collegeName}">
                    <label>Mobile Number</label><input class="input" name="mobileNumber" th:value="${student.mobileNumber}">
                    <label>Address</label><textarea class="input" name="address" th:text="${student.address}"></textarea>
                    <label>Passing Year</label><input class="input" type="number" name="passingYear" th:value="${student.passingYear}">
                    <label>CGPA</label><input class="input" type="number" step="0.01" name="cgpa" th:value="${student.cgpa}">
                    <button class="btn float-btn">Save Profile</button>
                </form>
            </div>
            <div class="card">
                <h3>Master Resume Upload</h3>
                <form th:action="@{/student/resume}" method="post" enctype="multipart/form-data">
                    <input class="input" type="file" name="file" accept=".pdf" required>
                    <button class="btn float-btn">Upload Resume</button>
                </form>
                <p class="muted" th:text="${student.resumePath != null ? student.resumePath : 'No resume uploaded yet'}"></p>
            </div>
        </section>
    </main>
</div>
</body>
</html>
