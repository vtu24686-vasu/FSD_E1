<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Student Details</title><link rel="stylesheet" th:href="@{/css/styles.css}"></head>
<body>
<div class="app-shell">
    <aside class="sidebar">
        <div class="brand">JobPilot</div>
        <a class="nav-link" th:href="@{/student/dashboard}">Dashboard</a>
        <a class="nav-link" th:href="@{/student/jobs}">Search Jobs</a>
        <a class="nav-link" th:href="@{/student/applied}">Applied Jobs</a>
        <a class="nav-link" th:href="@{/student/notifications}">Notifications</a>
        <a class="nav-link active" th:href="@{/student/details}">Student Details</a>
        <a class="nav-link" th:href="@{/student/profile}">Profile</a>
        <a class="nav-link" th:href="@{/logout}">Logout</a>
    </aside>
    <main class="main">
        <div class="topbar"><h3>Student Academic Profile</h3><span class="muted">Detailed personal and academic information</span></div>
        <section class="page">
            <div class="card">
                <table class="table">
                    <tr><th>Student Name</th><td th:text="${student.name}"></td><th>Roll Number</th><td th:text="${student.rollNumber}"></td></tr>
                    <tr><th>Email</th><td th:text="${student.email}"></td><th>Mobile</th><td th:text="${student.mobileNumber}"></td></tr>
                    <tr><th>Gender</th><td th:text="${student.gender}"></td><th>Date of Birth</th><td th:text="${student.dateOfBirth}"></td></tr>
                    <tr><th>Father Name</th><td th:text="${student.fatherName}"></td><th>Mother Name</th><td th:text="${student.motherName}"></td></tr>
                    <tr><th>Degree</th><td th:text="${student.degree}"></td><th>Branch</th><td th:text="${student.branch}"></td></tr>
                    <tr><th>College</th><td th:text="${student.collegeName}"></td><th>Passing Year</th><td th:text="${student.passingYear}"></td></tr>
                    <tr><th>CGPA</th><td th:text="${student.cgpa}"></td><th>Skills</th><td th:text="${student.skills}"></td></tr>
                    <tr><th>Address</th><td colspan="3" th:text="${student.address}"></td></tr>
                </table>
            </div>
        </section>
    </main>
</div>
</body>
</html>
