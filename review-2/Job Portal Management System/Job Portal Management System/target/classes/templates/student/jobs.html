<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Job Search</title><link rel="stylesheet" th:href="@{/css/styles.css}"><script th:src="@{/js/app.js}"></script></head>
<body>
<div class="app-shell">
    <aside class="sidebar">
        <div class="brand">JobPilot</div>
        <a class="nav-link" th:href="@{/student/dashboard}">Dashboard</a>
        <a class="nav-link active" th:href="@{/student/jobs}">Search Jobs</a>
        <a class="nav-link" th:href="@{/student/applied}">Applied Jobs</a>
        <a class="nav-link" th:href="@{/student/notifications}">Notifications</a>
        <a class="nav-link" th:href="@{/student/details}">Student Details</a>
        <a class="nav-link" th:href="@{/student/profile}">Profile</a>
        <a class="nav-link" th:href="@{/logout}">Logout</a>
    </aside>
    <main class="main">
        <div class="topbar"><h3>Discover Jobs</h3><span class="muted">Search + working filters</span></div>
        <section class="page">
            <div class="card">
                <div class="grid grid-3">
                    <input id="searchInput" class="input" placeholder="Search jobs" th:value="${q}" onkeyup="applyJobFilters()">
                    <select id="locationFilter" class="input" onchange="applyJobFilters()">
                        <option value="">All Locations</option>
                        <option value="Hyderabad">Hyderabad</option>
                        <option value="Bengaluru">Bengaluru</option>
                    </select>
                    <select id="expFilter" class="input" onchange="applyJobFilters()">
                        <option value="">Any Experience</option>
                        <option value="0">0 Years</option>
                        <option value="1">1 Year</option>
                        <option value="2">2 Years</option>
                        <option value="3">3+ Years</option>
                    </select>
                </div>
                <input id="skillFilter" class="input" placeholder="Filter by skill (or click below)" onkeyup="applyJobFilters()">
                <div class="chips">
                    <button type="button" class="chip chip-btn" onclick="setSkillChip('Java')">Java</button>
                    <button type="button" class="chip chip-btn" onclick="setSkillChip('Spring Boot')">Spring Boot</button>
                    <button type="button" class="chip chip-btn" onclick="setSkillChip('React')">React</button>
                    <button type="button" class="chip chip-btn" onclick="setSkillChip('Python')">Python</button>
                </div>
            </div>
            <div class="grid grid-3">
                <div class="card job-card" th:each="job : ${jobs}" th:attr="data-location=${job.location},data-exp=${job.minExperience},data-skills=${job.skillsRequired}">
                    <h4 th:text="${job.title}"></h4>
                    <p class="muted" th:text="${job.location}"></p>
                    <p class="muted" th:text="'Experience: ' + ${job.minExperience} + ' yrs'"></p>
                    <p th:text="${job.description}"></p>
                    <div class="chips">
                        <span class="chip" th:each="s : ${#strings.arraySplit(job.skillsRequired, ',')}" th:text="${#strings.trim(s)}"></span>
                    </div>
                    <div class="actions" style="margin-top:10px;">
                        <span class="badge APPLIED" th:text="${job.salary}"></span>
                        <a class="btn float-btn" th:href="@{'/student/apply/' + ${job.id}}">Apply Now</a>
                    </div>
                </div>
            </div>
        </section>
    </main>
</div>
</body>
</html>
