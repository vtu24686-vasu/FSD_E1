<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Student Notifications</title><link rel="stylesheet" th:href="@{/css/styles.css}"></head>
<body>
<div class="app-shell">
    <aside class="sidebar">
        <div class="brand">JobPilot</div>
        <a class="nav-link" th:href="@{/student/dashboard}">Dashboard</a>
        <a class="nav-link" th:href="@{/student/jobs}">Search Jobs</a>
        <a class="nav-link" th:href="@{/student/applied}">Applied Jobs</a>
        <a class="nav-link active" th:href="@{/student/notifications}">Notifications</a>
        <a class="nav-link" th:href="@{/student/profile}">Profile</a>
        <a class="nav-link" th:href="@{/logout}">Logout</a>
    </aside>
    <main class="main">
        <div class="topbar"><h3>Notifications</h3><span class="muted">Latest application updates</span></div>
        <section class="page">
            <div class="card" th:each="app : ${applications}">
                <div class="notice">
                    <strong th:text="${app.job.title}"></strong>
                    <p class="muted" th:text="'Status: ' + ${app.status} + ' | ' + ${#temporals.format(app.appliedAt, 'dd MMM yyyy HH:mm')}"></p>
                </div>
            </div>
        </section>
    </main>
</div>
</body>
</html>
